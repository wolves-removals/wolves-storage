<div class="col-span-12 wss-collect">
  <div class="wss-switch-row">
    <span class="wss-q">Would you like us to collect your goods?</span>
    <label class="wss-switch">
      <input type="checkbox" name="collect_goods" value="Yes" x-model="collect" aria-label="Would you like us to collect your goods?">
      <span class="wss-track"><span class="wss-thumb"></span></span>
      <span class="wss-state" x-text="collect ? 'Yes' : 'No'">No</span>
    </label>
  </div>
  <div class="wss-addr" x-show="collect" x-cloak x-transition.opacity>
    <p class="wss-addr-h"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 5.5-8 12-8 12s-8-6.5-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="2.6"/></svg> Collection address</p>
    <div class="grid grid-cols-12 gap-4">
      <div class="col-span-12"><label class="block font-semibold mb-1" for="f-a1">Address line 1</label><input class="w-full" type="text" id="f-a1" name="addr1" x-bind:required="collect" autocomplete="address-line1"></div>
      <div class="col-span-12"><label class="block font-semibold mb-1" for="f-a2">Address line 2 <span class="text-darkgrey">(optional)</span></label><input class="w-full" type="text" id="f-a2" name="addr2" autocomplete="address-line2"></div>
      <div class="col-span-12 md:col-span-7"><label class="block font-semibold mb-1" for="f-town">Town / City</label><input class="w-full" type="text" id="f-town" name="town" x-bind:required="collect" autocomplete="address-level2"></div>
      <div class="col-span-12 md:col-span-5"><label class="block font-semibold mb-1" for="f-pc">Postcode</label><input class="w-full" type="text" id="f-pc" name="postcode" x-bind:required="collect" autocomplete="postal-code"></div>
    </div>
    <p class="wss-addr-note">We collect from your door across West Sussex &mdash; from &pound;15/week.</p>
  </div>
</div>
